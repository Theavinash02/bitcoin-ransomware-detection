<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChainGuard — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #080c14;
      --surface: #0d1420;
      --border:  #1e2d45;
      --accent:  #00d4ff;
      --accent2: #0066ff;
      --danger:  #ff4757;
      --text:    #e8edf5;
      --muted:   #5a7090;
      --mono:    'Space Mono', monospace;
      --sans:    'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* dot-grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(0,212,255,0.15) 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: .4;
    }

    /* subtle glow behind card */
    body::after {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,102,255,0.18) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 24px;
      animation: fadeUp .5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Logo ── */
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 52px; height: 52px;
      margin: 0 auto 12px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; color: #fff;
      box-shadow: 0 8px 32px rgba(0,102,255,0.35);
    }

    .logo-name {
      font-family: var(--mono);
      font-size: 13px; font-weight: 700;
      letter-spacing: .14em;
      color: var(--accent);
      text-transform: uppercase;
    }

    .logo-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 5px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 36px 32px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    }

    .card-title {
      font-size: 20px; font-weight: 600;
      margin-bottom: 5px;
    }

    .card-sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    /* ── Error message ── */
    .error-msg {
      background: rgba(255,71,87,.1);
      border: 1px solid rgba(255,71,87,.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--danger);
      margin-bottom: 20px;
      display: flex; align-items: center; gap: 8px;
    }

    /* ── Fields ── */
    .field { margin-bottom: 18px; }

    .field label {
      display: block;
      font-size: 11px; font-weight: 500;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .field input {
      width: 100%;
      background: #070b12;
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 11px 14px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,212,255,.08);
    }

    .field input::placeholder { color: #1e3050; }

    /* ── Submit ── */
    .btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border: none;
      border-radius: 9px;
      color: #fff;
      font-family: var(--sans);
      font-size: 14px; font-weight: 600;
      letter-spacing: .03em;
      cursor: pointer;
      transition: opacity .2s, transform .12s;
      margin-top: 6px;
    }

    .btn:hover  { opacity: .88; }
    .btn:active { transform: scale(.98); }

    /* ── Footer ── */
    .footer {
      text-align: center;
      margin-top: 20px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: .06em;
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="logo">
      <div class="logo-icon">₿</div>
      <div class="logo-name">ChainGuard</div>
      <div class="logo-sub">Bitcoin Ransomware Detection System</div>
    </div>

    <div class="card">
      <div class="card-title">Sign in</div>
      <div class="card-sub">Enter your credentials to access the detection system.</div>

      {% if msg %}
      <div class="error-msg">
        <span>⚠</span> {{ msg }}
      </div>
      {% endif %}

      <form action="/adminval" method="POST">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username"
                 placeholder="admin" required autocomplete="username">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password"
                 placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button class="btn" type="submit">Access System</button>
      </form>
    </div>

    <div class="footer">// ChainGuard v1.0 &nbsp;·&nbsp; Anna University FYP 2024</div>
  </div>
</body>
</html>
